name: Pylint

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**.py'
      - '.github/workflows/pylint.yaml'
      - 'requirements.txt'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**.py'
      - '.github/workflows/pylint.yaml'
      - 'requirements.txt'
  workflow_dispatch:

# When calling a reusable workflow that needs elevated permissions, these permissions
# must be explicitly specified in the calling workflow.
permissions:
  # required for all workflows
  security-events: write
  # only required for workflows in private repositories
  actions: read
  contents: read

jobs:
  pylint:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    uses: KostasStefanidis/github-workflows/.github/workflows/pylint.yaml@main
    with:
      python_version: ${{ matrix.python-version }}

  pull-request:
    needs: pylint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check if Pylint passed
        run: echo "Pylint passed for all Python versions!"
